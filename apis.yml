aid: google-books
name: Google Books
description: >-
  The Google Books API allows you to perform full-text searches and retrieve
  book information, viewability, and eBook availability. You can search for
  volumes, access detailed metadata including authors, publishers, and ISBNs,
  manage personal bookshelves, and determine content accessibility.
type: Index
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
