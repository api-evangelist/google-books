  - Reading
apis:
  - aid: google-books:google-books
    name: Google Books API V1
    description: >-
      The Google Books API provides programmatic access to Google Books data.
      Search for volumes, retrieve book metadata, manage bookshelves, and
      access eBook availability information.
    humanURL: https://developers.google.com/books
    baseURL: https://www.googleapis.com/books/v1
    properties:
      - type: OpenAPI
        url: openapi/books.yml
      - type: JSONSchema
        url: json-schema/books.json
